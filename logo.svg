<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background Circle (Optional, for contrast if needed, but styling makes it a circle anyway) -->
  <circle cx="100" cy="100" r="95" fill="#f5f0e6"/>

  <!-- Main Head Shape -->
  <path d="M100 150 C 60 150, 40 110, 50 80 C 60 40, 140 40, 150 80 C 160 110, 140 150, 100 150 Z" fill="#8b5a2b"/>

  <!-- Curly Fur Texture (Abstracted as overlapping circles) -->
  <!-- Top Curls -->
  <circle cx="70" cy="55" r="20" fill="#a0522d"/>
  <circle cx="100" cy="45" r="25" fill="#a0522d"/>
  <circle cx="130" cy="55" r="20" fill="#a0522d"/>

  <circle cx="85" cy="40" r="15" fill="#8b5a2b"/>
  <circle cx="115" cy="40" r="15" fill="#8b5a2b"/>

  <!-- Ears (Floppy Doodle Ears) -->
  <path d="M50 75 C 30 75, 20 120, 45 140 C 60 150, 65 110, 55 90 Z" fill="#6b4226"/>
  <path d="M150 75 C 170 75, 180 120, 155 140 C 140 150, 135 110, 145 90 Z" fill="#6b4226"/>

  <!-- Additional Ear Fluff -->
  <circle cx="35" cy="105" r="12" fill="#8b5a2b"/>
  <circle cx="45" cy="125" r="10" fill="#8b5a2b"/>

  <circle cx="165" cy="105" r="12" fill="#8b5a2b"/>
  <circle cx="155" cy="125" r="10" fill="#8b5a2b"/>

  <!-- Cheeks / Snout area -->
  <circle cx="80" cy="120" r="25" fill="#cd853f"/>
  <circle cx="120" cy="120" r="25" fill="#cd853f"/>
  <ellipse cx="100" cy="125" rx="30" ry="20" fill="#cd853f"/>

  <!-- Nose -->
  <ellipse cx="100" cy="115" rx="12" ry="8" fill="#2e1a0f"/>
  <ellipse cx="98" cy="113" rx="4" ry="2" fill="#ffffff" opacity="0.6"/>

  <!-- Mouth -->
  <path d="M85 130 C 95 140, 105 140, 115 130" fill="none" stroke="#2e1a0f" stroke-width="3" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="75" cy="85" r="7" fill="#2e1a0f"/>
  <circle cx="125" cy="85" r="7" fill="#2e1a0f"/>

  <!-- Eye Highlights -->
  <circle cx="73" cy="83" r="2" fill="#ffffff"/>
  <circle cx="123" cy="83" r="2" fill="#ffffff"/>

  <!-- Eyebrow fluff -->
  <path d="M60 70 Q 75 60 85 75" fill="none" stroke="#cd853f" stroke-width="4" stroke-linecap="round"/>
  <path d="M140 70 Q 125 60 115 75" fill="none" stroke="#cd853f" stroke-width="4" stroke-linecap="round"/>
</svg>
